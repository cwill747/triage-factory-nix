name: Update to latest release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (e.g. v1.8.0). Leave blank for latest."
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Get current version
        id: current
        run: |
          version=$(grep 'version = "' flake.nix | head -1 | sed 's/.*version = "\(.*\)";/\1/')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Get target version
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version=$(gh release list -R sky-ai-eng/triage-factory --limit 1 --json tagName -q '.[0].tagName')
          fi
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          if [[ "${{ steps.current.outputs.version }}" == "${{ steps.target.outputs.version }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already at v${{ steps.target.outputs.version }}, nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run update script
        if: steps.check.outputs.skip == 'false'
        run: ./update.sh "v${{ steps.target.outputs.version }}"

      - name: Create pull request
        if: steps.check.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update to v${{ steps.target.outputs.version }}"
          title: "chore: update to v${{ steps.target.outputs.version }}"
          body: |
            Automated update from v${{ steps.current.outputs.version }} to v${{ steps.target.outputs.version }}.

            Generated by the **Update to latest release** workflow.
          branch: "update/v${{ steps.target.outputs.version }}"
          delete-branch: true
